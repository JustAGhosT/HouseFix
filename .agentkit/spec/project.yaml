# =============================================================================
# project.yaml — Project-level metadata for rich, context-aware AI configs
# Canonical source of truth for agentkit-forge
# Version: 0.1.0
# =============================================================================
# This file feeds into every generated config (AGENTS.md, CLAUDE.md, WARP.md,
# GEMINI.md, copilot-instructions.md, etc.) to produce project-specific output
# instead of generic framework boilerplate.
#
# All fields are optional — if missing, sync still works with generic output.
# Run `agentkit discover` to auto-detect values, or `agentkit init` to fill
# this interactively.
# =============================================================================

# Project identity
name: housefix
description: AI-powered Bill of Materials assistant for South African home renovations
phase: active # greenfield | active | maintenance | legacy

# Tech stack (auto-detected + confirmed at init)
stack:
  languages: [typescript]
  frameworks:
    frontend: [] # planned: [react, vite]
    backend: [express]
    css: [] # e.g. [tailwind, sass]
  orm: drizzle
  database: [sqlite]
  search: null # e.g. elasticsearch, meilisearch
  messaging: [] # e.g. [signalr, rabbitmq]

# Architecture
architecture:
  pattern: monolith
  apiStyle: rest
  monorepo: false
  monorepoTool: null # turborepo | nx | lerna | pnpm-workspaces

# Existing documentation & specs
documentation:
  hasPrd: true
  prdPath: docs/prd/
  hasAdr: true
  adrPath: docs/03_architecture/03_decisions/
  hasApiSpec: true
  apiSpecPath: docs/02_specs/03_api_spec.md
  hasTechnicalSpec: true
  technicalSpecPath: docs/02_specs/02_technical_spec.md
  hasDesignSystem: false
  designSystemPath: null # e.g. packages/ui/
  storybook: false
  designTokensPath: null # e.g. styles/tokens/

# Deployment & infrastructure
deployment:
  cloudProvider: null # aws | azure | gcp | vercel | netlify | self-hosted | none
  containerized: false
  environments: [] # e.g. [dev, staging, prod]
  iacTool: null # terraform | bicep | pulumi | cdk | terragrunt | none

# Infrastructure — IaC conventions, naming, and resource management
infrastructure:
  namingConvention: null # e.g. "{org}-{env}-{project}-{resourcetype}-{region}"
  defaultRegion: null # e.g. southafricanorth, eastus, westeurope
  org: null # e.g. nl, contoso — the org prefix used in resource names
  iacToolchain: [] # e.g. [terraform, terragrunt]
  stateBackend: null # azurerm | s3 | gcs | consul | local | none
  modulesRepo: null # e.g. git::https://github.com/org/tf-modules.git
  lockProvider: null # blob-lease | dynamodb | consul | none
  tagging:
    mandatory: [] # e.g. [environment, project, owner, cost-center]
    optional: [] # e.g. [team, created-by]

# Observability — monitoring, alerting, and tracing defaults
observability:
  monitoring:
    provider: null # azure-monitor | datadog | prometheus | grafana-cloud | cloudwatch | none
    dashboards: false
  alerting:
    provider: null # azure-monitor | pagerduty | opsgenie | grafana | none
    channels: [] # e.g. [email, slack, teams]
  tracing:
    provider: null # application-insights | jaeger | zipkin | otel-collector | none
    samplingRate: null # 0.0–1.0, e.g. 0.1 for 10%
  logging:
    centralised: false # whether logs are shipped to a central store
    retentionDays: null # e.g. 30, 90, 365

# Compliance — governance, DR, and audit policies
compliance:
  framework: null # soc2 | iso27001 | pci-dss | hipaa | gdpr | internal | none
  disasterRecovery:
    rpoHours: null # Recovery Point Objective in hours
    rtoHours: null # Recovery Time Objective in hours
    backupSchedule: null # daily | weekly | continuous | none
    geoRedundancy: false
  audit:
    enabled: false
    appendOnly: false # append-only event log for critical tables
    eventBus: null # service-bus | event-hub | sns | none

# Process & conventions
process:
  branchStrategy: github-flow
  commitConvention: conventional
  codeReview: required-pr
  teamSize: solo

# Testing strategy
testing:
  unit: [vitest]
  integration: [] # e.g. [playwright]
  e2e: [] # planned: [playwright]
  coverage: null # Target coverage percentage (0-100)

# External integrations (helps agents understand system boundaries)
integrations:
  - name: Claude API
    purpose: conversational BOM calculation (tool-use with search_products, calculate_bom)
  - name: Cashbuild
    purpose: product catalog and pricing (web scraping via Playwright)

# Cross-cutting concerns (project-specific decisions agents must follow)
crosscutting:
  logging:
    framework: null # serilog | winston | pino | bunyan | python-logging | log4net | nlog | none
    structured: false
    correlationId: false
    level: null # trace | debug | information | warning | error | critical
    sink: [] # e.g. [console, applicationInsights]
  errorHandling:
    strategy: null # problem-details | custom-envelope | raw | none
    globalHandler: false
    customExceptions: false
    errorCodes: false
  authentication:
    provider: null # azure-ad | azure-ad-b2c | auth0 | firebase | cognito | keycloak | custom-jwt | none
    strategy: null # jwt-bearer | cookie | session | api-key | oauth2-code
    multiTenant: false
    rbac: false
  caching:
    provider: null # redis | memcached | in-memory | none
    patterns: [] # e.g. [cache-aside, write-through]
    distributedCache: false
  api:
    versioning: url-segment
    pagination: offset
    responseFormat: envelope
    rateLimiting: false
  database:
    migrations: code-first
    seeding: true
    transactionStrategy: manual
    connectionPooling: false
  performance:
    bundleBudget: null # KB limit for frontend bundles
    lazyLoading: false
    imageOptimization: false
  featureFlags:
    provider: null # launchdarkly | azure-app-config | unleash | flagsmith | custom | none
  environments:
    naming: [dev, prod]
    configStrategy: env-vars
    envFilePattern: .env.example
